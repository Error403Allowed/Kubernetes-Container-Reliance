apiVersion: apps/v1
kind: Deployment
metadata:
  name: chaos-monkey
  labels:
    app: chaos-monkey
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chaos-monkey
  template:
    metadata:
      labels:
        app: chaos-monkey
    spec:
      containers:
      - name: chaos
        image: curlimages/curl:latest
        command:
        - /bin/sh
        - -c
        - |
          while true; do
            echo "[chaos] Killing a web container..."
            curl -sf http://web-app:8081/kill
            echo " done"
            SLEEP=$(( (RANDOM % 6) + 5 ))
            sleep "$SLEEP"
          done
