apiVersion: apps/v1
kind: Deployment
metadata:
  name: chaos-monkey
  labels:
    app: chaos-monkey
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chaos-monkey
  template:
    metadata:
      labels:
        app: chaos-monkey
    spec:
      serviceAccountName: chaos-monkey
      containers:
      - name: chaos
        image: bitnami/kubectl:latest
        command:
        - /bin/sh
        - -c
        - |
          while true; do
            POD=$(kubectl get pods -l app=web-app --field-selector status.phase=Running -o name | head -1)
            if [ -n "$POD" ]; then
              echo "[chaos] Killing $POD"
              kubectl delete "$POD"
            fi
            SLEEP=$(( (RANDOM % 6) + 5 ))
            sleep "$SLEEP"
          done
